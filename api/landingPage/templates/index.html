<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workflow API</title>
  <!-- Poppins only, simple -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 1.5rem;
      background: #FFF6EF;
      font-family: 'Poppins', sans-serif;
      -webkit-font-smoothing: antialiased;
      text-align: center;
      color: #1F1C1C;
    }
    .eyebrow {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #7B7557;
    }
    .headline {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .headline span {
      color: #3AFF86;
    }
    .subcopy {
      font-size: 0.9rem;
      color: #59543E;
    }
  </style>
</head>
<body>
  <p class="eyebrow">WORKFLOW COWORKING SPACE</p>
  <p class="headline">Your best work gets done <span>here.</span></p>
  <p class="subcopy">The first ever coworking space and study hub in Ozamiz City and Misamis Occidental.</p>
</body>
</html>
